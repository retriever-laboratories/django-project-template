services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_web
    restart: unless-stopped

    env_file:
      - .env

    expose:
      - "8000"

    volumes:
      - ./src:/app/src
      - static_volume:/app/staticfiles

    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

    command: >
      sh -c "
        uv run python manage.py migrate &&
        uv run python manage.py runserver 0.0.0.0:8000
      "
  caddy:
    image: caddy:2
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_caddy
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/app/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
        - web


  postgres:
    image: postgres:17
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_postgres
    restart: unless-stopped

    env_file:
      - .env

    entrypoint: >
      sh -c '
        URL="$${DATABASE_URL#*://}";
        CREDS="$${URL%@*}";
        HOSTPATH="$${URL#*@}";
        DBPATH="$${HOSTPATH#*/}";
        export POSTGRES_USER="$${CREDS%%:*}";
        export POSTGRES_PASSWORD="$${CREDS#*:}";
        export POSTGRES_DB="$${DBPATH%%\?*}";
        exec docker-entrypoint.sh postgres
      '

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "URL=\"$${DATABASE_URL#*://}\"; CREDS=\"$${URL%@*}\"; HOSTPATH=\"$${URL#*@}\"; DBPATH=\"$${HOSTPATH#*/}\"; USER=\"$${CREDS%%:*}\"; DB=\"$${DBPATH%%\\?*}\"; pg_isready -U \"$${USER}\" -d \"$${DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_keycloak
    restart: unless-stopped

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"

    command:
      - start-dev
      - --import-realm

    ports:
      - "8080:8080"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/localhost/8080; printf \"GET /realms/local/protocol/saml/descriptor HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro

volumes:
  postgres_data:
  static_volume:
  caddy_data:
  caddy_config:
  keycloak_data:
