services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_web
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${WEB_PORT:-8000}:8000"

    volumes:
      - static_volume:/app/src/staticfiles

    depends_on:
      postgres:
        condition: service_healthy

    command: >
      sh -c "
        uv run python manage.py migrate &&
        uv run python manage.py runserver 0.0.0.0:8000
      "

  postgres:
    image: postgres:17
    container_name: ${COMPOSE_PROJECT_NAME:-django_project}_postgres
    restart: unless-stopped

    env_file:
      - .env

    entrypoint: >
      sh -c '
        URL="$${DATABASE_URL#*://}";
        CREDS="$${URL%@*}";
        HOSTPATH="$${URL#*@}";
        DBPATH="$${HOSTPATH#*/}";
        export POSTGRES_USER="$${CREDS%%:*}";
        export POSTGRES_PASSWORD="$${CREDS#*:}";
        export POSTGRES_DB="$${DBPATH%%\?*}";
        exec docker-entrypoint.sh postgres
      '

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "URL=\"$${DATABASE_URL#*://}\"; CREDS=\"$${URL%@*}\"; HOSTPATH=\"$${URL#*@}\"; DBPATH=\"$${HOSTPATH#*/}\"; USER=\"$${CREDS%%:*}\"; DB=\"$${DBPATH%%\\?*}\"; pg_isready -U \"$${USER}\" -d \"$${DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  static_volume:
