{% extends "base.html" %}

    {% block title %}
      {% if object %}
        Edit {{ model_name }}
      {% else %}
        New {{ model_name }}
      {% endif %}
    {% endblock %}

{% block content %}
  <div class="flex max-w-md flex-col gap-4 p-4">
    <h1 class="text-2xl font-bold">
      {% if object %}
        Edit {{ model_name }}
      {% else %}
        New {{ model_name }}
      {% endif %}
    </h1>

    <form
      method="post"
      action="{% if object %}{% url 'contact-edit' object.pk %}{% else %}{% url 'contact-create' %}{% endif %}"
      class="flex flex-col gap-4">
      {% csrf_token %}

      {{ formset }}

      <div class="flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'contact-list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
