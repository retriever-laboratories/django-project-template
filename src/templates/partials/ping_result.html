{% if ok %}
  {# a wrapper is needed for oob swaps, only the content of this element will be swapped #}
  <div hx-swap-oob="beforeend:#toasts">
    <div
      class="alert alert-success flex justify-between"
      data-ttl="3000"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    >
      HTMX POST OK
      <button class="btn btn-outline btn-xs btn-neutral btn-square toast-close" data-toast-close type="button" aria-label="Dismiss">x</button>
    </div>
  </div>
  <div class="inline-grid *:[grid-area:1/1]">
    <div class="status status-success animate-ping"></div>
    <div class="status status-success"></div>
  </div> Pong
{% else %}
  <div hx-swap-oob="beforeend:#toasts">
    <div
      class="alert alert-error flex justify-between"
      data-ttl="5000"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <span>HTMX POST failed</span>
      <button class="btn btn-ghost btn-xs toast-close" data-toast-close type="button" aria-label="Dismiss">x</button>
    </div>
  </div>
  <div class="inline-grid *:[grid-area:1/1]">
    <div class="status status-error animate-ping"></div>
    <div class="status status-error"></div>
  </div> Failed to ping
{% endif %}
