{% if ok %}
  <div class="alert alert-success" role="status" hx-swap-oob="beforeend:#toasts"  delta-tll="3000" aria-live="polite" aria-atomic="true">
    <span class="badge bg-success">Database connection OK. Result: {{ result }}</span>
  </div>
{% else %}
  <div class="alert alert-error" role="alert" hx-swap-oob="beforeend:#toasts"  delta-tll="3000" aria-live="assertive" aria-atomic="true">
    <span class="badge bg-error">Database connection failed: {{ error }}</span>
  </div>
{% endif %}
