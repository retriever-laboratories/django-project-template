{% extends "base.html" %}

{% block title %} {{ object.name }} {% endblock %}

{% block content %}
  <div class="flex max-w-md flex-col gap-4 p-4">
    <h1 class="text-2xl font-bold">{{ object.name }}</h1>

    <dl class="flex flex-col gap-2">
      <div>
        <dt class="text-sm opacity-60">Email</dt>
        <dd>{{ object.email }}</dd>
      </div>
      <div>
        <dt class="text-sm opacity-60">Role</dt>
        <dd>{{ object.get_role_display }}</dd>
      </div>
      <div>
        <dt class="text-sm opacity-60">Active</dt>
        <dd>{{ object.is_active|yesno:"Yes,No" }}</dd>
      </div>
    </dl>

    <div class="flex gap-2">
      <a href="{% url view.url_names.edit object.pk %}" class="btn btn-primary">Edit</a>
      <a href="{% url view.url_names.list %}" class="btn">Back</a>
    </div>
  </div>
{% endblock %}
