<div class="flex flex-col gap-2 p-2">
  <div class="flex items-center gap-2">
    <input type="search" name="{{ filter.accessor }}" placeholder="search"/>
    <button type="button">+ Add</button>
  </div>

  {% if filter.values %}
    <div class="flex flex-wrap items-center gap-2">
      {% for value in filter.values %}
        <span class="flex items-center gap-1 border border-base-300 px-2">
          {{ value }}
          <button type="button" aria-label="Remove {{ value }}">×</button>
        </span>
      {% endfor %}
    </div>
  {% endif %}

  {% include "table/filters/actions.html" with can_apply=filter.values only %}
</div>
