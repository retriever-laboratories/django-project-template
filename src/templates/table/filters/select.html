<div class="flex flex-col gap-2">
  <ul class="flex flex-col gap-1">
    {% for option in filter.options %}
      <li>
        <label class="flex items-center gap-2">
          <input
            type="checkbox"
            class="checkbox checkbox-xs rounded-sm"
            name="{{ filter.field }}"
            value="{{ option.value }}"
            {% if option.value in request.GET|getlist:filter.field %}checked{% endif %}/>
          {{ option.label }}
        </label>
      </li>
    {% endfor %}
  </ul>

  {% include "table/filters/actions.html" only %}
</div>
