<tbody>
  {% for row in context.table.rows %}
    <tr>
      {% for cell in row.cells %}
        <td>{{ cell.value }}</td>
      {% endfor %}
    </tr>
  {% empty %}
    <tr>
      <td colspan="{{ context.table.columns|length }}" class="text-center text-base-content/60">No records found.</td>
    </tr>
  {% endfor %}
</tbody>
