<tbody>
  {% for row in table.rows %}
    <tr{% if row.id %} data-row-id="{{ row.id }}"{% endif %}>
      {% for cell in row.cells %}
        <td>{{ cell.value }}</td>
      {% endfor %}
    </tr>
  {% empty %}
    <tr>
      <td colspan="{{ table.columns|length }}" class="text-center text-base-content/60">No records found.</td>
    </tr>
  {% endfor %}
</tbody>
