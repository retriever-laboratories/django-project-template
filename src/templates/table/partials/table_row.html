<tr data-row-id="{{ object.id }}" class="hover:bg-base-300">
  {% for cell in object.row %}
    <td class="{{ cell.class }}">
      {% if cell.partial and cell.partial != "default" %}
        {% include cell.partial with value=cell.value object=object class=cell.class %}
      {% else %}
        {{ cell.value }}
      {% endif %}
    </td>
  {% endfor %}
</tr>
