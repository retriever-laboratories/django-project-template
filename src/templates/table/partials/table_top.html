<div class="flex items-center justify-end border-b border-base-300 px-4 py-3">
  <details class="dropdown dropdown-end dropdown-top">
    <summary class="btn btn-sm">Filter</summary>
    <ul class="menu dropdown-content z-10 w-56 rounded-box bg-base-100 p-2 shadow">
      {% for column in context.table.columns %}
        {% if column.filterable %}
          <li>
            <button type="button">{{ column.label }}</button>
          </li>
        {% endif %}
      {% endfor %}
    </ul>
  </details>
</div>
