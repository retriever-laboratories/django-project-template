{% load utils %}
<nav class="flex flex-wrap items-center gap-2 text-sm" aria-label="Table pagination">
  <p>Page <span class="font-bold">{{ page_obj.number }}</span> of <span class="font-bold">{{ page_obj.paginator.num_pages }}</span></p>

  <div class="join">
    <button
      type="button"
      class="join-item btn btn-xs w-[26px]"
      {% if page_obj.has_previous %}
        hx-get="{% page_url request page_obj.previous_page_number %}"
      {% else %}
        disabled
      {% endif %}
      aria-label="Previous page">«</button>
    <button
      type="button"
      class="join-item btn btn-xs w-[26px]"
      {% if page_obj.has_next %}
        hx-get="{% page_url request page_obj.next_page_number %}"
      {% else %}
        disabled
      {% endif %}
      aria-label="Next page">»</button>
  </div>

  <p><span class="font-bold">{{ page_obj.paginator.count }}</span> Total items <span class="font-bold">/</span> Showing</p>

  <div
    class="dropdown dropdown-top dropdown-center"
    x-data="{
      open: false,
    }"
    :class="{ 'dropdown-open': open }"
    @click.outside="open = false">
    <button type="button" class="btn btn-sm btn-outline w-[50px]" :aria-expanded="open" @click="open = !open">
      {{ page_obj.paginator.per_page }}
    </button>

    <ul
      class="dropdown-content menu menu-xs z-10 w-[70px] rounded-box bg-base-100 shadow-xs"
      x-show="open"
      style="display: none">
      {% for option in page_size_options %}
        <li><button type="button">{{ option.size }}</button></li>
      {% endfor %}
    </ul>
  </div>

  <p>items per page.</p>
</nav>
