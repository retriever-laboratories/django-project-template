{% load static utils %}
{% sort_direction request field as direction %}
<div class="dropdown dropdown-bottom dropdown-start">
  <button type="button" class="flex cursor-pointer items-center gap-1" aria-expanded="false" data-dropdown-trigger>
    {{ model|verbose_name:field }}
    {% if direction == "asc" %}
      <img src="{% static 'icons/arrow-down.svg' %}" class="size-4" alt="">
    {% elif direction == "desc" %}
      <img src="{% static 'icons/arrow-up.svg' %}" class="size-4" alt="">
    {% else %}
      <img src="{% static 'icons/chevron-up-down.svg' %}" class="size-4 text-base-content/30" alt="">
    {% endif %}
  </button>

  <ul class="dropdown-content menu menu-vertical menu-xs z-10 w-[141px] rounded-box bg-base-100 font-normal">
    <li class="menu-title">Sort by</li>
    {% sort_url request field "asc" as asc_url %}
    {% sort_url request field "desc" as desc_url %}
    <li>
      <a href="{{ asc_url }}" hx-get="{{ asc_url }}" {% if direction == "asc" %}class="font-semibold"{% endif %}>
        <img src="{% static 'icons/arrow-down.svg' %}" class="size-4" alt="">
        Ascending
      </a>
    </li>
    <li>
      <a href="{{ desc_url }}" hx-get="{{ desc_url }}" {% if direction == "desc" %}class="font-semibold"{% endif %}>
        <img src="{% static 'icons/arrow-up.svg' %}" class="size-4" alt="">
        Descending
      </a>
    </li>
  </ul>
</div>
