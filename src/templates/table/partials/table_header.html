<thead>
  <tr>
    {% for column in table.columns %}
      <th scope="col">
        <div class="flex items-center gap-2">
          <span>{{ column.label }}</span>
          {% if column.sort.enabled %}
            <button type="button">
              {% if column.sort.direction == "asc" %}
                ↑
              {% elif column.sort.direction == "desc" %}
                ↓
              {% else %}
                ↕
              {% endif %}
            </button>
          {% endif %}
        </div>
      </th>
    {% endfor %}
  </tr>
</thead>
