{% load utils %}
<thead>
  <tr>
    {% for column in table.columns %}
      <th scope="col" class="z-[2]">
        {% if column.sortable %}
          {% sort_direction request column.field as direction %}
          {% include "table/partials/sort.html" with label=column.field direction=direction %}
        {% else %}
          {{ column.field }}
        {% endif %}
      </th>
    {% endfor %}
  </tr>
</thead>
