<thead>
  <tr>
    {% for column in table.columns %}
      <th scope="col" class="z-[2]">
        {% if column.sortable %}
          {% include "table/partials/sort.html" with label=column.field %}
        {% else %}
          {{ column.field }}
        {% endif %}
      </th>
    {% endfor %}
  </tr>
</thead>
