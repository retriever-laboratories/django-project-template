<thead>
  <tr>
    {% for column in table.columns %}
      <th scope="col" class="z-[2]">
        {% if column.sort.enabled %}
          {% include "table/partials/sort.html" with column=column only %}
        {% else %}
          {{ column.label }}
        {% endif %}
      </th>
    {% endfor %}
  </tr>
</thead>
