{% load static %}
<div class="flex flex-wrap items-center gap-x-2 gap-y-0.5">
  <div class="flex items-center gap-0.5 rounded-box bg-base-200 px-1 py-0.5">
    <span class="badge badge-xs badge-primary badge-soft">Name</span>
    <span class="badge badge-xs gap-1">
      Ada
      <button type="button" class="cursor-pointer" aria-label="Remove Ada">
        <img src="{% static 'icons/x-mark.svg' %}" class="size-3" alt="">
      </button>
    </span>
  </div>

  <div class="flex items-center gap-0.5 rounded-box bg-base-200 px-1 py-0.5">
    <span class="badge badge-xs badge-primary badge-soft">Role</span>
    <span class="badge badge-xs gap-1">
      Admin
      <button type="button" class="cursor-pointer" aria-label="Remove Admin">
        <img src="{% static 'icons/x-mark.svg' %}" class="size-3" alt="">
      </button>
    </span>
    <span class="badge badge-xs gap-1">
      Editor
      <button type="button" class="cursor-pointer" aria-label="Remove Editor">
        <img src="{% static 'icons/x-mark.svg' %}" class="size-3" alt="">
      </button>
    </span>
  </div>
</div>
