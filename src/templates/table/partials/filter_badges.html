{% load heroicons %}
<div class="flex flex-wrap items-center gap-x-2 gap-y-0.5">
  {% for filter in filters %}
    {% if filter.badges %}
      <div class="flex items-center gap-0.5 rounded-box bg-base-200 px-1 py-0.5">
        <span class="badge badge-xs badge-primary badge-soft">{{ filter.label }}</span>
        {% for badge in filter.badges %}
          <span class="badge badge-xs gap-1">
            {{ badge.value }}
            <button type="button" class="cursor-pointer" {% if badge.remove_url %}hx-get="{{ badge.remove_url }}"{% endif %} aria-label="Remove {{ badge.value }}">
              {% heroicon_micro "x-mark" class="size-3" %}
            </button>
          </span>
        {% endfor %}
      </div>
    {% endif %}
  {% endfor %}
</div>
