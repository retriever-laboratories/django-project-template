{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
  <div class="px-6 pt-10 text-3xl font-semibold">Welcome to the Home Page</div>

  <div class="px-6 mt-4">
    This is a simple Django app template with HTMX and Daisy UI. Use the button below to test an HTMX POST request.
    <div class="mt-2 flex gap-4">
      <button
        class="btn btn-primary"
        id="ping-btn"
        hx-post="{% url 'ping' %}"
        hx-target="#ping-result"
        hx-swap="innerHTML">
        Ping (HTMX POST)
      </button>
      <div id="ping-result" class="w-1/5 p-2 bg-gray-200 rounded-full items-center justify-center flex gap-2">Click the button to ping!</div>
    </div>

  </div>
{% endblock %}
