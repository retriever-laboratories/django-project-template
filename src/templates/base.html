{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>

        <title>{% block title %}App{% endblock %}</title>

        <!-- CSRF token (for HTMX requests) -->
        <meta name="csrf-token" content="{{ csrf_token }}"/>

        <!-- Global CSS -->
        <link rel="stylesheet" href="{% static 'css/main.css' %}">

        <!-- HTMX -->
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>

        <!-- Daisy UI-->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        {% block extra_head %}{% endblock %}
    </head>
    <body hx-boost="true" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <!-- Global toasts / messages container -->
        <div id="toasts" class="toast toast-end toast-top z-50"></div>

        <div class="drawer">
            <input id="my-drawer-1" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content">
                {% include "partials/navbar.html" %}
                <main id="main-content">{% block content %}{% endblock %}</main>
            </div>
            
            {% include "partials/sidebar_content.html" %}
        </div>

        <!-- Our HTMX init (CSRF header + small helpers) -->
        <script src="{% static 'js/htmx-init.js' %}"></script>

        <!-- Toast auto-dismiss -->
        <script src="{% static 'js/toast.js' %}"></script>


        {% block extra_js %}{% endblock %}
    </body>
</html>
